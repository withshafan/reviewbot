<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <rect x="12" y="16" width="40" height="32" rx="8" fill="url(#grad)"/>
  <!-- Antenna -->
  <line x1="32" y1="16" x2="32" y2="6" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="3" fill="#00D4FF"/>
  <!-- Eyes -->
  <circle cx="24" cy="30" r="4" fill="#0D1117"/>
  <circle cx="40" cy="30" r="4" fill="#0D1117"/>
  <circle cx="25" cy="29" r="1.5" fill="#F0F6FC"/>
  <circle cx="41" cy="29" r="1.5" fill="#F0F6FC"/>
  <!-- Mouth / code brackets -->
  <text x="23" y="42" font-family="monospace" font-size="10" font-weight="bold" fill="#0D1117">&lt;/&gt;</text>
  <!-- Ears -->
  <rect x="6" y="24" width="6" height="12" rx="3" fill="url(#grad)" opacity="0.7"/>
  <rect x="52" y="24" width="6" height="12" rx="3" fill="url(#grad)" opacity="0.7"/>
</svg>
